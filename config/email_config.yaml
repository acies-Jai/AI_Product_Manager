# Email configuration for the PM Assistant
# Credentials are read from .env (GMAIL_SENDER, GMAIL_APP_PASSWORD)
# If credentials are absent, emails are logged to outputs/email_log.txt instead

triggers:
  # Sent automatically when ⚡ Generate Artifacts is clicked
  artifacts_generated:
    recipients:
      - jaiadithya.andi@aciesglobal.com
      - anirudh.shadipuram@aciesglobal.com
      - dharshini.venkatesan@aciesglobal.com
      - fathinaiffat.sirajudeen@aciesglobal.com
      - madhumohan.reddyyeddula@aciesglobal.com
      - raghavendra.tiwari@aciesglobal.com
      - tuhin.samanta@aciesglobal.com
    subject: "PM Artifacts Updated — {date}"
    body: |
      Hi team,

      The PM Assistant has generated an updated set of artefacts for the
      Customer App & Checkout Experience charter.

      Artefacts included: Roadmap, Key Focus Areas, Requirements,
      Success Metrics, Impact Quadrant.

      Please review and share your inputs with Jaiadithya (Director of Product).

      — PM Intelligence Layer

  # Department lead mapping — used by the agent when it identifies an action item.
  # The agent resolves the right department and picks recipients from here.
  action_item_leads:
    product:    [jaiadithya.andi@aciesglobal.com]
    tech:       [anirudh.shadipuram@aciesglobal.com]
    cs:         [dharshini.venkatesan@aciesglobal.com]
    design:     [fathinaiffat.sirajudeen@aciesglobal.com]
    finance:    [madhumohan.reddyyeddula@aciesglobal.com]
    growth:     [raghavendra.tiwari@aciesglobal.com]
    data:       [tuhin.samanta@aciesglobal.com]
    operations: [dharshini.venkatesan@aciesglobal.com]
    leadership: [jaiadithya.andi@aciesglobal.com, anirudh.shadipuram@aciesglobal.com]
